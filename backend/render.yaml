services:
  - type: web
    name: sentiment-analysis-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SENTIMENT_MODEL
        value: distilbert-base-uncased-finetuned-sst-2-english
      - key: ALLOWED_ORIGINS
        value: "*"
